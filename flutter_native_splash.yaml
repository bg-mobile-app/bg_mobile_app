# flutter_native_splash configuration file
# See: https://pub.dev/packages/flutter_native_splash

flutter_native_splash:
  color: "#3366FF" # Main app color (AppColors.primary)
  image: assets/img/logo/app_logo.png # Background image (must exist)
  branding: assets/img/logo/logo_black.png # Logo at the top (must exist)
  android: true
  ios: true
  web: false

  android_gravity: center
  ios_content_mode: center
